name: CI

on:
  push:
    branches: ["main", "dev"]
  pull_request:

jobs:
  test-build-scan:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: rootpass
          MYSQL_DATABASE: hostel_management
          MYSQL_USER: hostel
          MYSQL_PASSWORD: hostel_pass
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -uroot -prootpass"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=12

    env:
      DB_HOST: 127.0.0.1
      DB_USER: hostel
      DB_PASSWORD: hostel_pass
      DB_NAME: hostel_management

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint
        run: ruff check tests db.py

      - name: Run tests
        run: pytest -q

      - name: Build Docker image
        run: docker build -t smart-hostel:${{ github.sha }} .

      - name: Trivy file system scan
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            aquasec/trivy:0.52.2 \
            fs --exit-code 0 --no-progress /workspace

  deploy-ec2:
    name: CD Deploy to EC2
    runs-on: ubuntu-latest
    needs: test-build-scan
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      ANSIBLE_HOST_KEY_CHECKING: "False"
      ANSIBLE_TIMEOUT: "30"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ansible
        run: |
          python -m pip install --upgrade pip
          pip install "ansible-core>=2.16,<2.18"

      - name: Check deployment secrets
        id: check_secrets
        run: |
          if [ -n "${{ secrets.EC2_HOST }}" ] && [ -n "${{ secrets.EC2_USER }}" ] && [ -n "${{ secrets.EC2_SSH_PRIVATE_KEY }}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create SSH key file
        if: steps.check_secrets.outputs.enabled == 'true'
        run: |
          install -m 600 /dev/null /tmp/deploy_key.pem
          printf "%s" "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > /tmp/deploy_key.pem

      - name: Create Ansible inventory
        if: steps.check_secrets.outputs.enabled == 'true'
        run: |
          cat > /tmp/inventory.ini <<'EOF'
          [app]
          app-server ansible_host=${{ secrets.EC2_HOST }} ansible_user=${{ secrets.EC2_USER }} ansible_ssh_private_key_file=/tmp/deploy_key.pem ansible_ssh_common_args='-o StrictHostKeyChecking=no -o ConnectTimeout=15'
          EOF

      - name: Pre-deploy SSH connectivity check
        if: steps.check_secrets.outputs.enabled == 'true'
        run: |
          ssh -i /tmp/deploy_key.pem -o BatchMode=yes -o StrictHostKeyChecking=no -o ConnectTimeout=15 "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" "echo SSH_OK"

      - name: Deploy with Ansible
        if: steps.check_secrets.outputs.enabled == 'true'
        run: |
          timeout 20m ansible-playbook -i /tmp/inventory.ini infra/ansible/deploy.yml \
            --extra-vars "repo_url=https://github.com/${{ github.repository }}.git repo_branch=main app_dir=/opt/smart_hostel"

      - name: Post-deploy health check
        if: steps.check_secrets.outputs.enabled == 'true'
        run: |
          curl --fail --retry 20 --retry-delay 5 "http://${{ secrets.EC2_HOST }}:5000/debug/db" > /dev/null

      - name: Skip deploy (missing secrets)
        if: steps.check_secrets.outputs.enabled != 'true'
        run: echo "CD skipped. Add EC2_HOST, EC2_USER, and EC2_SSH_PRIVATE_KEY secrets to enable deployment."
