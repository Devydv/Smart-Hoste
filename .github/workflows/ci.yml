name: CI

on:
  push:
    branches: ["main", "dev"]
  pull_request:

jobs:
  test-build-scan:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: rootpass
          MYSQL_DATABASE: hostel_management
          MYSQL_USER: hostel
          MYSQL_PASSWORD: hostel_pass
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -uroot -prootpass"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=12

    env:
      DB_HOST: 127.0.0.1
      DB_USER: hostel
      DB_PASSWORD: hostel_pass
      DB_NAME: hostel_management

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint
        run: ruff check tests db.py

      - name: Run tests
        run: pytest -q

      - name: Build Docker image
        run: docker build -t smart-hostel:${{ github.sha }} .

      - name: Trivy file system scan
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            aquasec/trivy:0.52.2 \
            fs --exit-code 0 --no-progress /workspace
