services:
  mysql:
    image: mysql:8.4
    container_name: smart-hostel-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: hostel_management
      MYSQL_USER: hostel
      MYSQL_PASSWORD: hostel_pass
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./infra/sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-prootpass"]
      interval: 10s
      timeout: 5s
      retries: 12

  web:
    build: .
    container_name: smart-hostel-web
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_USER: hostel
      DB_PASSWORD: hostel_pass
      DB_NAME: hostel_management
    ports:
      - "5000:5000"

volumes:
  mysql_data:
