---
- name: Deploy Smart Hostel with Docker Compose
  hosts: app
  become: true

  vars:
    app_dir: /opt/smart_hostel
    repo_url: https://github.com/Devydv/Smart-Hoste.git
    repo_branch: main

  tasks:
    - name: Install required system packages
      apt:
        name:
          - git
          - docker.io
          - docker-compose
        state: present
        update_cache: true

    - name: Ensure Docker service is running
      service:
        name: docker
        enabled: true
        state: started

    - name: Create app directory
      file:
        path: "{{ app_dir }}"
        state: directory
        mode: "0755"

    - name: Clone or update repository
      git:
        repo: "{{ repo_url }}"
        dest: "{{ app_dir }}"
        version: "{{ repo_branch }}"
        force: true

    - name: Build and start containers
      shell: |
        if docker compose version >/dev/null 2>&1; then
          docker compose up -d --build
        else
          docker-compose up -d --build
        fi
      args:
        chdir: "{{ app_dir }}"
